services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
      - SLACK_ERROR_CHANNEL_ID=${SLACK_ERROR_CHANNEL_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mock-rag-service
      - mock-mcp-server

  mock-rag-service:
    build: ./mock-services/mock-rag-service
    container_name: mock-rag-service
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "8081:8080"

  mock-mcp-server:
    build: ./mock-services/mock-mcp-server
    container_name: mock-mcp-server
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "8082:8080"

volumes:
  n8n_data:
