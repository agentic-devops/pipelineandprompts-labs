apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-mcp-egress
  namespace: platform-tools
spec:
  podSelector:
    matchLabels:
      app: platform-mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443    # OpenShift API — AUTHOR: confirm port for your cluster
          protocol: TCP
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus (adjust namespace selector to match your monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
