# docker-compose.yml — waybill blue/green slots + PostgreSQL
# Copy to /opt/app/ on your deploy server

services:
  postgres:
    image: postgres:16-alpine
    container_name: waybill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       waybill
      POSTGRES_USER:     waybill
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waybill"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432"   # localhost only — not exposed externally

  waybill-blue:
    image: ${IMAGE_NAME}:${BLUE_TAG:-latest}
    container_name: waybill-blue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7070:8000"
    environment:
      DATABASE_URL: postgresql://waybill:${POSTGRES_PASSWORD}@postgres:5432/waybill
      SLOT:         blue
      APP_VERSION:  ${BLUE_TAG:-dev}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  waybill-green:
    image: ${IMAGE_NAME}:${GREEN_TAG:-latest}
    container_name: waybill-green
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9091:8000"
    environment:
      DATABASE_URL: postgresql://waybill:${POSTGRES_PASSWORD}@postgres:5432/waybill
      SLOT:         green
      APP_VERSION:  ${GREEN_TAG:-dev}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
