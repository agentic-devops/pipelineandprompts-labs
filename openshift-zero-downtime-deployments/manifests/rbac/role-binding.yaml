apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-deployer-binding
  namespace: zero-downtime-demo
  labels:
    app.kubernetes.io/managed-by: pipeline
    project: zero-downtime-deployments
subjects:
  - kind: ServiceAccount
    name: pipeline-deployer
    namespace: zero-downtime-demo
roleRef:
  kind: Role
  name: pipeline-deployer-role
  apiGroup: rbac.authorization.k8s.io
