apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-blue
  namespace: zero-downtime-demo
  labels:
    app: nodejs-zero-downtime
    deployment-colour: blue
    app.kubernetes.io/managed-by: pipeline
    project: zero-downtime-deployments
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Blue deployment — baseline production traffic"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-zero-downtime
      deployment-colour: blue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nodejs-zero-downtime
        deployment-colour: blue
        version: "1.0.0"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nodejs
          image: quay.io/flyers22/nodejs-zero-downtime:blue
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DEPLOYMENT_COLOUR
              value: "blue"
            - name: APP_VERSION
              value: "1.0.0"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      restartPolicy: Always
