apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: flagsmith
  namespace: zero-downtime-demo
  labels:
    app: flagsmith
    project: zero-downtime-deployments
  annotations:
    description: "Route to access Flagsmith UI on ROSA HCP"
spec:
  host: ""  # Leave empty — OpenShift assigns automatically on ROSA HCP
  to:
    kind: Service
    name: flagsmith
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
