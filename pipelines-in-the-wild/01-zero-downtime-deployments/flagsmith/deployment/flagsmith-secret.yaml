apiVersion: v1
kind: Secret
metadata:
  name: flagsmith-secret
  namespace: zero-downtime-demo
  labels:
    app: flagsmith
    project: zero-downtime-deployments
  annotations:
    description: "Flagsmith application secrets — demo only"
type: Opaque
stringData:
  # Django secret key — generate a real one before applying:
  # python3 -c "import secrets; print(secrets.token_urlsafe(50))"
  DJANGO_SECRET_KEY: "changeme-generate-a-real-django-secret-key-before-applying"

  # Must match DATABASE_URL in flagsmith-postgres-secret
  DATABASE_URL: "postgresql://flagsmith:changeme-before-applying@flagsmith-postgres:5432/flagsmith"

  # Flagsmith admin credentials — change before applying
  DJANGO_ALLOWED_HOSTS: "*"
