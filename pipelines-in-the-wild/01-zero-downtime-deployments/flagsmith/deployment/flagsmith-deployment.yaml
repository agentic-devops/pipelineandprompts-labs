apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagsmith
  namespace: zero-downtime-demo
  labels:
    app: flagsmith
    project: zero-downtime-deployments
  annotations:
    description: "Flagsmith feature flag service — self-hosted on ROSA HCP"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flagsmith
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flagsmith
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Wait for PostgreSQL to be ready before starting Flagsmith
        - name: wait-for-postgres
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z flagsmith-postgres 5432; do
                echo "PostgreSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: flagsmith
          image: flagsmith/flagsmith:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flagsmith-secret
                  key: DATABASE_URL
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flagsmith-secret
                  key: DJANGO_SECRET_KEY
            - name: DJANGO_ALLOWED_HOSTS
              valueFrom:
                secretKeyRef:
                  name: flagsmith-secret
                  key: DJANGO_ALLOWED_HOSTS
            - name: ALLOW_REGISTRATION_WITHOUT_INVITE
              value: "True"
            - name: DJANGO_SETTINGS_MODULE
              value: "app.settings.production"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
