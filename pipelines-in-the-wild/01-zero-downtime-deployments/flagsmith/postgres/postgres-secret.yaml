apiVersion: v1
kind: Secret
metadata:
  name: flagsmith-postgres-secret
  namespace: zero-downtime-demo
  labels:
    app: flagsmith-postgres
    project: zero-downtime-deployments
  annotations:
    description: "PostgreSQL credentials for Flagsmith — demo only"
type: Opaque
stringData:
  # Change these before applying — do not commit real credentials
  POSTGRES_DB: flagsmith
  POSTGRES_USER: flagsmith
  POSTGRES_PASSWORD: changeme-before-applying
  DATABASE_URL: postgresql://flagsmith:changeme-before-applying@flagsmith-postgres:5432/flagsmith
