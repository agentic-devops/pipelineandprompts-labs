apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flagsmith-postgres-pvc
  namespace: zero-downtime-demo
  labels:
    app: flagsmith-postgres
    project: zero-downtime-deployments
  annotations:
    description: "PVC for Flagsmith PostgreSQL — demo only, no backup configured"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Leave storageClassName empty to use ROSA HCP default (gp3-csi)
  # storageClassName: gp3-csi
