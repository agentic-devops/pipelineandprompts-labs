apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nodejs-zero-downtime
  namespace: zero-downtime-demo
  labels:
    app: nodejs-zero-downtime
    project: zero-downtime-deployments
    canary-stage: "full-cutover"
  annotations:
    description: "Full cutover — 100% green, 0% blue. Blue remains running."
    haproxy.router.openshift.io/balance: roundrobin
    haproxy.router.openshift.io/disable_cookies: "true"
    haproxy.router.openshift.io/timeout: 30s
spec:
  host: ""
  to:
    kind: Service
    name: nodejs-blue
    weight: 0
  alternateBackends:
    - kind: Service
      name: nodejs-green
      weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
