name: Validate Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location \
              'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            manifests/**/*.yaml

      - name: Check for placeholder values
        run: |
          # Fail if any AUTHOR TO VALIDATE placeholders remain uncommented
          if grep -r "AUTHOR TO VALIDATE" manifests/ --include="*.yaml" | grep -v "^#"; then
            echo "Unresolved AUTHOR TO VALIDATE placeholders found in manifests"
            exit 1
          fi
