# Lab-only SecretStore using ESO fake provider.
# Use when you do not have AWS/Azure/Vault available (e.g. OpenShift demo clusters).
# Not for production — validates ESO sync, RBAC, and rotation flow only.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: dev-secretstore
  namespace: dev
  labels:
    app.kubernetes.io/managed-by: external-secrets
    project: secrets-management-multi-cloud
    provider: fake-lab
spec:
  provider:
    fake:
      data:
        - key: "dev/registry/pull-secret"
          value: '{"host":"registry.internal","username":"lab-user","password":"lab-password-change-me"}'
          version: "v1"
        - key: "dev/registry/pull-secret"
          value: '{"host":"registry.internal","username":"rotated-user","password":"rotated-password-change-me"}'
          version: "v2"
