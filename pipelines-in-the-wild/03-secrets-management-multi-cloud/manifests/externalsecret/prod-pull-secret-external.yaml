apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
  namespace: prod
  labels:
    app.kubernetes.io/managed-by: external-secrets
    project: secrets-management-multi-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: prod-secretstore
    kind: SecretStore
  target:
    name: registry-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .registryHost }}": {
                "username": "{{ .registryUsername }}",
                "password": "{{ .registryPassword }}",
                "auth": "{{ printf "%s:%s" .registryUsername .registryPassword | b64enc }}"
              }
            }
          }
  data:
    - secretKey: registryHost
      remoteRef:
        key: prod/registry/pull-secret
        # AUTHOR TO VALIDATE — remote secret path in your provider
        property: host
        # AUTHOR TO VALIDATE — field name for registry hostname
    - secretKey: registryUsername
      remoteRef:
        key: prod/registry/pull-secret
        property: username
        # AUTHOR TO VALIDATE — field name for username
    - secretKey: registryPassword
      remoteRef:
        key: prod/registry/pull-secret
        property: password
        # AUTHOR TO VALIDATE — field name for password
